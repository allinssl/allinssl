<!doctype html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>域名查询结果 - 域名注册</title>
	<link href="/font-awesome.min.css" rel="stylesheet" />
	<style id="contact-service-popup-style">
		.contact-service-trigger .qr-code-popup,
		.premium-domain-trigger .qr-code-popup {
			pointer-events: none;
		}

		.contact-service-trigger:hover .qr-code-popup,
		.premium-domain-trigger:hover .qr-code-popup {
			opacity: 1;
			visibility: visible;
		}
	</style>
</head>

<body>
	<div class="font-sans bg-light text-secondary">
		<div class="container-1200 pt-4 pb-16">
			<div class="flex flex-col lg:flex-row gap-6">
				<!-- 左侧：域名查询结果 (3/4宽度) -->
				<div class="w-full lg:w-3/4">
					<!-- 域名结果列表 -->
					<section class="bg-white rounded-sm shadow-sm">
						<!-- Tab切换区域 - 紧凑版 -->
						<div class="domain-search-tabs">
							<div class="tab-buttons flex">
								<button id="tab-normal" class="tab-btn active">
									域名注册
								</button>
								<button id="tab-ai" class="tab-btn">
									<i class="fa fa-search"></i>AI域名推荐
									<span class="new-badge">new</span>
								</button>
							</div>
						</div>

						<!-- 域名注册搜索面板 -->
						<div id="normal-search-panel" class="search-panel">
							<div class="flex w-full mb-2">
								<!-- 搜索框和按钮 -->
								<div id="search-section" class="flex flex-col sm:flex-row gap-3 w-full">
									<div class="input-container">
										<input type="text" value="" placeholder="输入您想注册的域名（如：yourbrand）" class="search-input"
											id="domain-query-input" />
										<i class="fa fa-times-circle clear-input-button visible" id="clear-input-button" title="清空输入"></i>
									</div>
									<button class="primary-action-button text-lg">重新查询</button>
								</div>
							</div>
						</div>

						<!-- AI推荐搜索面板 -->
						<div id="ai-search-panel" class="search-panel hidden">
							<!-- AI推荐搜索框和按钮 -->
							<div class="flex w-full mb-2">
								<!-- 整体渐变容器 -->
								<div class="ai-search-container">
									<div class="ai-search-inner">
										<form autocomplete="off">
											<div id="ai-search-section" class="flex flex-col lg:flex-row gap-3 w-full">
												<!-- 品牌名称输入框 -->
												<div class="ai-input-group flex-1">
													<i class="ai-input-icon fa fa-building"></i>
													<input type="text" id="brand-name-input" class="ai-search-input"
														placeholder="请输入品牌/公司/个人/产品名称" autocomplete="off" spellcheck="false">
												</div>

												<!-- 行业信息输入框 -->
												<div class="ai-input-group flex-1">
													<i class="ai-input-icon fa fa-industry"></i>
													<input type="text" id="industry-input" class="ai-search-input" placeholder="请输入行业信息"
														autocomplete="off" spellcheck="false">
												</div>

												<!-- AI推荐按钮 -->
												<button type="button" id="ai-recommend-btn" class="ai-transparent-button">
													<i class="ai-button-icon fa fa-search"></i>
													<span class="ai-button-text">AI推荐</span>
												</button>
											</div>
										</form>
									</div>
								</div>
							</div>
						</div>
						<!-- 筛选器 -->
						<div class="flex flex-wrap justify-between items-center mb-4 gap-3">
							<!-- <div class="text-base font-bold text-dark ml-2">域名搜索结果</div> -->
							<!-- <div class="flex flex-wrap gap-2">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="recommended">推荐</button>
                <button class="filter-btn" data-filter="popular">热卖</button>
                <button class="filter-btn" data-filter="discount">特惠</button>
                <button class="filter-btn" data-filter="cheap">新人特惠</button>
              </div> -->
						</div>

						<!-- 域名列表 -->
						<div id="search-results" class="min-h-50 pb-2">
							<!-- 空状态提示 -->
							<div id="empty-state-container" class="text-center py-8 hidden">
								<div class="text-gray-400 mb-2">
									<i class="fa fa-search fa-3x"></i>
								</div>
								<div class="text-gray-500">赶快搜索你的专属域名吧！</div>
							</div>
						</div>
					</section>

					<!-- 底部行动区 -->
					<section class="py-8 mt-8 bg-primary-5 rounded-sm-xl shadow-sm">
						<div class="max-w-3xl mx-auto text-center">
							<h2 class="text-xl font-bold text-dark mb-4">还没找到满意的域名？</h2>
							<p class="text-base text-secondary-80 mb-6">尝试其他关键词或联系我们的域名顾问获取专业建议</p>

							<span class="contact-service-trigger relative inline-block mr-4 mb-4">
								<button
									class="bg-white border-2 border-primary text-primary hover:bg-primary-5 font-bold px-6 py-3 rounded-sm transition-all cursor-pointer text-lg">
									<i class="fa fa-headphones mr-2"></i>联系域名顾问
								</button>
								<!-- 二维码悬浮层（同 index.html 效果） -->
								<div
									class="qr-code-popup absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 opacity-0 invisible transition-all duration-300 z-50">
									<div class="bg-white rounded-lg shadow-xl p-4 border border-gray-200">
										<div class="text-center mb-2">
											<p class="text-sm font-medium text-gray-700">扫码联系客服</p>
										</div>
										<img src="https://www.bt.cn/Public/new/images/wechat-qrcode.png" alt="二维码"
											class="w-24 h-24 mx-auto" />
										<div class="text-center mt-2">
											<p class="text-xs text-gray-500">微信客服</p>
										</div>
										<div
											class="absolute top-full left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-transparent border-t-white">
										</div>
									</div>
								</div>
							</span>
							<!-- <button
                id="requery-bottom"
                class="bg-primary hover:bg-primary-90 text-white font-bold px-6 py-3 rounded-sm cursor-pointer transition-all shadow-lg hover:shadow-primary-30 hover:-translate-y-1 text-lg mb-4"
              >
                重新查询
              </button> -->
						</div>
					</section>
				</div>

				<!-- 右侧：购物车操作区 (1/4宽度) -->
				<div class="w-full lg:w-1/4">
					<div class="sticky top-4 bg-neutral-50 rounded-sm shadow-sm overflow-hidden h-fit z-40 bg-gray-50">
						<!-- 购物车标题 -->
						<div class="bg-gray-100 text-dark px-5 py-5 rounded-sm-t">
							<div class="flex justify-between items-center">
								<div class="text-[16px] flex items-center text-dark">
									<i class="fa fa-shopping-cart mr-2 text-primary"></i>我的购物车
									<span class="cart-counter ml-2">0</span>
								</div>
								<button id="clear-cart-button"
									class="text-secondary-70 cursor-pointer hover:text-danger text-sm py-1 rounded-sm transition-all hidden"
									title="清空购物车">
									<i class="fa fa-trash-o mr-1 font-"></i>清空
								</button>
							</div>
						</div>

						<!-- 购物车内容 -->
						<div class="">
							<!-- 购物车为空状态 -->
							<div id="empty-cart" class="py-12 text-center">
								<i class="fa fa-shopping-cart text-5xl text-gray-200 mb-4"></i>
								<p class="text-secondary-70 mb-6">购物车还是空的</p>
								<p class="text-sm text-secondary-60">从左侧选择域名加入购物车</p>
							</div>

							<!-- 购物车有商品状态 -->
							<div id="filled-cart" class="hidden">
								<!-- 添加最大高度和滚动条 -->
								<div id="cart-items" class="max-h-[480px] overflow-y-auto">
									<!-- 购物车项目将通过JS动态添加 -->
								</div>

								<div class="border-t border-t-gray-100 border-t-solid p-4">
									<!-- 价格汇总 - 左侧平铺布局 -->
									<div class="flex flex-col flex-wrap items-start gap-2 text-sm">
										<div class="flex items-center">
											<span class="text-secondary-80 mr-2">总价:</span>
											<span id="cart-original-total">¥0</span>，减去
											<span class="text-secondary-80 mr-2">优惠:</span>
											<span class="font-medium text-success" id="cart-discount">-¥0</span>
										</div>
										<div class="flex items-center">
											<span class="text-sm text-dark  mr-2">应付金额:</span>
											<span id="cart-payable" class="text-2xl text-orange-500 font-bold">¥0</span>
										</div>
									</div>
									<button id="checkout-button"
										class="w-full bg-primary hover:bg-primary-90 text-white font-bold py-3 rounded-sm transition-all cursor-pointer text-lg mt-2">
										立即购买
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- HTML Templates -->
		<!-- 空状态模板 -->
		<script type="text/template" id="empty-state-template">
      <div id="empty-state-container" class="text-center py-8">
      	<div class="text-gray-400 mb-2">
      		<i class="{{icon}}"></i>
      	</div>
      	<div class="text-gray-500">{{text}}</div>
      	{{#if hint}}
      	<div class="text-gray-400 text-sm mt-1">{{hint}}</div>
      	{{#end if}}
      </div>
    </script>

		<!-- 搜索结果项模板 -->
		<script type="text/template" id="search-result-item-template">
      {{#each list as item, index}}
         <div class="bg-white border border-gray-100 border-solid border-b-[transparent] transition-custom relative hover:border-primary {{#if item.isLast}}!border-b border-b-gray-100{{#end if}}">
        	{{#if item.discountPercent }}
        	<div class="discount-badge" data-text="省{{item.discountPercent}}%"></div>
        	{{#end if}}
        	<div class="flex items-center justify-between p-4 gap-3">
        		<div class="flex items-center">
        			<div class="text-sm mr-4">
								<div class="font-bold {{#if item.isRegistered}}line-through text-gray-400{{#end if}}">
									{{item.domain}}
        			{{#if item.isRegistered}}
        			<div class="status-badge text-gray-600 border-gray-800">{{item.statusText}}</div>
        			{{#end if}}
        			{{#if item.hasRecommended}}
        			<div class="status-badge status-badge-recommended">推荐</div>
        			{{#end if}}
        			{{#if item.hasPopular}}
        			<div class="status-badge status-badge-popular">热门</div>
        			{{#end if}}
        			{{#if item.hasDiscount}}
        			<div class="status-badge status-badge-discount">特惠</div>
        			{{#end if}}
							{{#if item.hasNew}}
							<div class="status-badge status-badge-new">新人特惠</div>
							{{#end if}}
							{{#if item.isCnSuffix}}
							<div class="status-badge status-badge-cn">可购买隐私保护</div>
							{{#end if}}
							{{#if item.isTopSuffix}}
							<div class="status-badge status-badge-top">自带隐私保护</div>
							{{#end if}}
								</div>
								{{#if item.hasAiMeaning}}
								<!-- AI推荐域名意义解释 -->
								<div class="domain-meaning text-gray-400">
									AI解读：{{item.meaning}}
								</div>
								{{#end if}}
							</div>
        		</div>
						{{#if item.isRegistered}}
						<!-- 已注册：显示查看WHOIS链接 -->
						<a href="javascript:void(0)" class="whois-query-btn ml-2 text-primary opacity-60 hover:opacity-100 text-xs underline cursor-pointer" title="查看WHOIS信息" data-domain="{{item.domain}}">
							<i class="fa fa-search mr-1 text-xs"></i>查看WHOIS
						</a>
						{{/if}}
						
         		<div class="flex items-center gap-6 {{#if item.isRegistered}}!hidden{{/if}}">
        			<div class="text-right relative price-tooltip-container">
        				<div class="flex items-center justify-end price-trigger cursor-pointer">
        					<span class="text-secondary-60 line-through mr-2 text-xs">{{item.formattedOriginalPrice}}</span>
        					<span class="text-sm text-orange-500">{{item.formattedPrice}}元/首年</span>
        					<i class="fa fa-caret-down text-gray-400 ml-1 hover:text-primary transition-colors"></i>
        				</div>
        				<div class="text-xs text-secondary-60 mr-4">续费{{item.renewPrice}}/年</div>

        				<!-- 价格悬浮窗 -->
								<div class="price-tooltip absolute right-0 top-full bg-white rounded-lg shadow-xl border px-4 py-4 opacity-0 invisible transition-all duration-200 ease-out transform translate-y-1" style="z-index: 9999">
        					<div class="text-sm font-medium mb-2 text-dark text-center">多年购买价格</div>
        					<table class="w-full text-xs">
        						<thead class="border-b border-gray-100">
        							<tr>
        								<th class="py-2 px-3 text-left bg-gray-50 text-gray-600 font-medium whitespace-nowrap">类型</th>
        								<th class="py-2 px-3 text-center bg-gray-50 text-gray-600 font-medium whitespace-nowrap">1年</th>
        								<th class="py-2 px-3 text-center bg-gray-50 text-gray-600 font-medium whitespace-nowrap">3年</th>
        								<th class="py-2 px-3 text-center bg-gray-50 text-gray-600 font-medium whitespace-nowrap">5年</th>
        								<th class="py-2 px-3 text-center bg-gray-50 text-gray-600 font-medium whitespace-nowrap">10年</th>
        							</tr>
        						</thead>
        						<tbody>
        							<tr class="border-b border-gray-100">
        								<td class="py-2 px-3 font-medium text-gray-700 whitespace-nowrap">新购</td>
        								<td class="py-2 px-3 text-center">{{item.formattedPrice}}</td>
        								<td class="py-2 px-3 text-center">{{item.price3Years}}</td>
        								<td class="py-2 px-3 text-center">{{item.price5Years}}</td>
        								<td class="py-2 px-3 text-center border-r border-b border-gray-200">{{item.price10Years}}</td>
        							</tr>
        							<tr class="border-b border-gray-100">
        								<td class="py-2 px-3 font-medium text-gray-700 whitespace-nowrap">续费</td>
        								<td class="py-2 px-3 text-center">{{item.renewPrice}}</td>
        								<td class="py-2 px-3 text-center border-r border-b border-gray-200">{{item.renewPrice3Years}}</td>
        								<td class="py-2 px-3 text-center border-r border-b border-gray-200">{{item.renewPrice5Years}}</td>
        								<td class="py-2 px-3 text-center">-</td>
        							</tr>
        						</tbody>
        					</table>
        				</div>
        			</div>
        			<div class="flex gap-2  transition-opacity">
        				<button class="add-to-cart action-button hover:bg-primary hover:text-white"
                   data-domain="{{item.domain}}"
                   data-price="{{item.price}}"
                   data-original-price="{{item.originalPrice}}"
                    {{#if item.isInCart}}disabled{{#end if}}
                   title="{{#if item.isInCart}}点击移除{{#else}}加入购物车{{#end if}}">
                   <span class="text-xs">{{#if item.isInCart}}已加入购物车{{#else}}加入购物车{{#end if}}</span>
                 </button>
        			</div>
        		</div>
        	</div>
         </div>
      {{#end each}}
			<p class="text-xs text-secondary-80 my-6 text-center">更多后缀，正在加紧上线中！</p>
    </script>

		<!-- 查看更多按钮模板 -->
		<script type="text/template" id="view-more-button-template">
      <div class="text-center py-4 ">
      	<button id="show-more-button" class="text-primary hover:text-primary-90 font-medium cursor-pointer">查看更多域名</button>
      </div>
    </script>

		<!-- 购物车项目模板 -->
		<script type="text/template" id="cart-item-template">
      <div class="border-b border-gray-100 p-3 px-4 mb-1 hover:bg-neutral-100 last:border-b-0">
      	<div class="flex justify-between items-start">
      		<div class="flex-1">
      			<div class="max-w-40 truncate" title="{{domain}}">{{domain}}</div>
      			<div class="text-sm text-gray-500">
      				<div class="custom-select year-selector" data-index="{{index}}" data-value="{{years}}" style="width: 80px; display: inline-block;">
      					<div class="select-display h-[28px] leading-[28px]">
      						<span class="select-text">{{years}}年</span>
      						<svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width: 12px; height: 12px;">
      							<polyline points="6,9 12,15 18,9"></polyline>
      						</svg>
      					</div>
      					<!-- 下拉菜单内容由JS动态生成 -->
      				</div>
      			</div>
      		</div>
      		<div class="text-right">
      			<div class=" flex items-center"><span class="text-secondary-60 line-through mr-2 text-xs">{{formattedOriginalPrice}}</span>{{formattedPrice}}</div>
      			<button class="remove-from-cart text-xs text-secondary-80 cursor-pointer hover:text-red-700" data-index="{{index}}">
      				移除
      			</button>
      		</div>
      	</div>
      </div>
    </script>

		<!-- 模板选项模板 -->
		<script type="text/template" id="template-option-template">
      <div class="template-option p-2 hover:bg-gray-50 cursor-pointer" data-id="{{id}}">
      	<div class="font-medium text-sm">{{name}}</div>
      	<div class="text-xs text-gray-500">{{desc}}</div>
      	{{#if formattedPrice}}
      	<div class="text-xs text-primary font-medium mt-1">{{formattedPrice}}</div>
      	{{#end if}}
      </div>
    </script>

		<!-- Modal容器模板 -->
		<script type="text/template" id="modal-container-template">
      <div id="{{id}}" class="modal-container-dialog fixed inset-0 bg-black-50  hidden flex items-center justify-center px-5 py-5 {{className}}" style="z-index: {{zIndex}};">
      	<!-- Modal内容将动态插入 -->
      </div>
    </script>

		<!-- Modal内容模板 -->
		<script type="text/template" id="modal-content-template">
      <div class="bg-white rounded-sm {{sizeClass}} w-full transform transition-all scale-95">
      	<div class="flex  justify-between items-center p-5 border-b border-gray-100">
      		<h3 class="text-xl font-bold text-dark">{{title}}</h3>
      		{{#if closable}}
      		<button class="cursor-pointer w-7 h-7 items-center justify-center flex text-gray-400 rounded hover:bg-red-50 hover:text-danger text-xl transition-colors modal-close">
      			<i class="fa fa-close"></i>
      		</button>
      		{{#end if}}
      	</div>

      	<!-- 内容 -->
      	<div class="modal-body-content p-5 pt-1">
      		{{content}}
      	</div>

      	{{#if hasButtons}}
      	<div class="flex gap-4 p-6 border-t border-gray-100">
      		{{buttonsHtml}}
      	</div>
      	{{#end if}}
      </div>
    </script>

		<!-- Modal按钮模板 -->
		<script type="text/template" id="modal-button-template">
      <button
      	{{#if id}}id="{{id}}"{{#end if}}
      	class="flex-1 py-3 rounded-sm transition-all {{typeClass}} {{className}}"
      	{{#if onClick}}onclick="{{onClick}}"{{#end if}}
      >
      	{{text}}
      </button>
    </script>

		<!-- Notification容器模板 -->
		<script type="text/template" id="notification-container-template">
      <div id="{{id}}" class="fixed {{positionClass}} transform translate-y-8 opacity-0 transition-all duration-300 ease-out" style="z-index: {{zIndex}};">
      	<!-- Notification内容将动态插入 -->
      </div>
    </script>

		<!-- Notification内容模板 -->
		<script type="text/template" id="notification-content-template">
      <div class="{{bgClass}} {{textClass}} px-6 py-4 rounded-lg shadow-lg flex items-center min-w-[300px] max-w-[400px] z-9999">
      	<i class="fa {{iconClass}} {{iconColor}} text-xl mr-3 flex-shrink-0"></i>
      	<div class="flex-1">
      		{{#if title}}<div class="font-medium mb-1">{{title}}</div>{{#end if}}
      		<div class="{{#if title}}text-sm{{#else}}font-medium{{#end if}}">{{message}}</div>
      	</div>
      	{{#if closable}}
      	<button class="ml-3 text-white text-xl hover:text-gray-200 transition-colors notification-close cursor-pointer">
      		<i class="fa fa-times"></i>
      	</button>
      	{{#end if}}
      </div>
    </script>

		<!-- 购买弹窗模板选择器模板 -->
		<script type="text/template" id="buy-modal-template-selector-template">
      <div class="mt-4">
      	<p class="text-sm font-medium mb-2">选择实名模板：</p>
      	<div class="relative z-50">
      		<div class="template-selector-modal flex justify-between items-center border rounded-sm p-2 text-sm cursor-pointer">
      			<span id="modal-selected-template">{{selectedTemplateName}}</span>
      			<i class="fa fa-chevron-down text-xs text-gray-400"></i>
      		</div>
      		<!-- 下拉菜单内容由JS动态生成 -->
      	</div>
      </div>
    </script>

		<!-- 购买弹窗价格信息模板 -->
		<script type="text/template" id="buy-modal-price-info-template">
      <div class="mt-4 px-5 py-5 bg-light rounded-sm">
      	<div class="flex justify-between mb-2">
      		<span class="text-secondary-80">域名原价</span>
      		<span>{{formattedOriginalPrice}}</span>
      	</div>
      	{{#if hasDiscount}}
      	<div class="flex justify-between mb-2">

        </div>

        <!-- 订单信息 -->
        <div class="order-info-section bg-gray-50 rounded-lg p-6 mb-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-800">订单详情</h3>
            <span class="text-sm text-gray-500">订单号：{{orderNumber}}</span>
          </div>

          <!-- 域名列表 -->
          <div class="domain-list max-h-40 overflow-y-auto">
            {{#each domains as item,index}}
            <div class="domain-item flex justify-between items-center py-3 border-b border-gray-200 last:border-b-0">
              <div class="domain-info">
                <div class="font-medium text-gray-800">{{item.domain}}</div>
                <div class="text-sm text-gray-500">{{item.years}}年 · {{item.templateName}}</div>
              </div>
              <div class="domain-price">
                <div class="font-medium text-gray-800">{{item.formattedPrice}}</div>
              </div>
            </div>
            {{#end each}}
          </div>

          <!-- 支付与价格汇总（合并） -->
          <div class="price-summary border-t border-gray-200 pt-4">
            <div class="flex justify-between items-center mb-3">
              <span class="text-gray-600 text-sm">支付时间：</span>
              <span class="text-gray-800 text-sm">{{paymentTime}}</span>
            </div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-gray-600">原价：</span>
              <span class="text-gray-800">{{formattedOriginalTotal}}</span>
            </div>
            {{#if hasDiscount}}
            <div class="flex justify-between items-center mb-2">
              <span class="text-gray-600">优惠：</span>
              <span class="text-green-600">-{{formattedDiscount}}</span>
            </div>
            {{/if}}
            <div class="flex justify-between items-center text-lg font-bold">
              <span class="text-gray-800">实付金额：</span>
              <span class="text-orange-500">{{formattedPayableTotal}}</span>
            </div>
          </div>
        </div>


				<!-- 自动跳转提示 -->
        <div class="text-center mt-6 text-sm text-gray-600">
          即将跳转到域名控制台，倒计时 <span id="success-countdown" class="font-medium text-gray-800">5</span> 秒，
          <a id="success-jump-now" class="text-primary underline cursor-pointer">立即跳转</a>
        </div>
      </div>
    </script>

		<!-- 模板选项下拉选择模板 -->
		<script type="text/template" id="template-select-option-template">
      <div class="select-option {{#if selected}}selected{{#end if}}" data-value="{{id}}">{{name}} - {{desc}}</div>
    </script>

		<!-- 确认删除弹窗模板 -->
		<script type="text/template" id="confirm-delete-modal-template">
      <div class="confirm-delete-container">
        <div class="flex items-center mb-4">
          <div class="flex-shrink-0 w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mr-4">
            <i class="fa fa-exclamation-triangle text-red-500 text-xl"></i>
          </div>
          <div>
            <h3 class="text-lg font-bold text-gray-800 mb-1">确认删除</h3>
            <p class="text-gray-600">您确定要删除选中的 {{itemCount}} 件商品吗？</p>
          </div>
        </div>

        <!-- 商品列表预览 -->
        <div class="bg-gray-50 rounded-lg p-4 mb-4 max-h-60 overflow-y-auto">
          <div class="text-sm text-gray-700 mb-2 font-medium">将要删除的商品：</div>
          <div class="space-y-2">
            {{#each items}}
            <div class="flex justify-between items-center py-2 border-b border-gray-200 last:border-b-0">
              <div class="flex-1">
                <div class="font-medium text-gray-800">{{domain}}</div>
                <div class="text-sm text-gray-500">{{years}}年</div>
              </div>
              <div class="text-sm font-medium text-gray-700">{{formattedPrice}}</div>
            </div>
            {{/each}}
          </div>
        </div>

        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4">
          <div class="flex items-center">
            <i class="fa fa-info-circle text-yellow-500 mr-2"></i>
            <p class="text-sm text-gray-700">删除后这些商品将从购物车中移除，此操作不可撤销。</p>
          </div>
        </div>

        <div class="flex gap-3 justify-end">
          <button id="cancel-delete-btn" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
            取消
          </button>
          <button id="confirm-delete-btn" class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
            确认删除
          </button>
        </div>
      </div>
    </script>

		<!-- 域名注册协议模态窗口 -->
		<script type="text/template" id="domain-agreement-modal-template">
      <div class="domain-agreement-modal">
        <div class="mb-6">
          <h3 class="text-[25px] font-bold text-gray-800 mb-8 flex items-center justify-center">
            <i class="fa fa-file-text-o text-primary-500 mr-2"></i>
            域名注册注意事项
          </h3>
          <div class="text-sm text-gray-700 leading-relaxed">
            <ul class="space-y-4">
              <li class="flex items-start px-4 border border-gray-200 rounded-lg hover:border-gray-300 transition-colors">
                <div class="flex-shrink-0 w-8 h-8 bg-primary-10 rounded-full flex items-center justify-center mr-3 mt-0.5">
                  <span class="text-primary-600 font-semibold text-sm">1</span>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-800 mt-1">即时产品特性</h4>
                  <p class="text-gray-600">
                    域名为即时性产品，其注册成功以最终付款完成为准。域名一旦注册成功，不支持退款。请用户务必仔细核对所选域名信息，并尽快完成结算。
                  </p>
                </div>
              </li>
              
              <li class="flex items-start px-4 border border-gray-200 rounded-lg hover:border-gray-300 transition-colors">
                <div class="flex-shrink-0 w-8 h-8 bg-primary-10 rounded-full flex items-center justify-center mr-3 mt-0.5">
                  <span class="text-primary-600 font-semibold text-sm">2</span>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-800 mt-1">实名认证要求</h4>
                  <p class="text-gray-600">
                    根据工业和信息化部以及《中华人民共和国网络安全法》的相关规定，域名注册必须完成实名认证。未完成实名认证的域名将无法正常使用。
                  </p>
                </div>
              </li>
              
              <li class="flex items-start px-4 border border-gray-200 rounded-lg hover:border-gray-300 transition-colors">
                <div class="flex-shrink-0 w-8 h-8 bg-primary-10 rounded-full flex items-center justify-center mr-3 mt-0.5">
                  <span class="text-primary-600 font-semibold text-sm">3</span>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-800 mt-1">溢价域名续费</h4>
                  <p class="text-gray-600">
                    部分后缀的溢价域名，其续费价格可能高于普通域名的续费价格。具体续费价格请以系统结算时显示的价格为准。
                  </p>
                </div>
              </li>
              
              <li class="flex items-start px-4 border border-gray-200 rounded-lg hover:border-gray-300 transition-colors">
                <div class="flex-shrink-0 w-8 h-8 bg-primary-10 rounded-full flex items-center justify-center mr-3 mt-0.5">
                  <span class="text-primary-600 font-semibold text-sm">4</span>
                </div>
                <div>
                  <h4 class="font-semibold text-gray-800 mt-1">禁止违规用途</h4>
                  <p class="text-gray-600">
                    通过我司申请注册的域名，严禁用于赌博、色情、钓鱼、私服等任何违反法律法规的用途。
                  </p>
                </div>
              </li>
            </ul>
          </div>
        </div>
        
        <div class="flex justify-end gap-3 py-4 border-t border-gray-200 justify-center">
          <button id="agreement-modal-confirm" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary-60 transition-colors cursor-pointer">
            同意并继续
          </button>
        </div>
      </div>
    </script>


	</div>
	<!-- 主内容区 - 左右3:1布局 -->

	<!-- JavaScript -->
	<script type="text/javascript" src="/jquery-3.6.0.min.js"></script>
	<script type="text/javascript" src="https://www.bt.cn/static/js/jquery.qrcode.min.js"></script>
	<script type="module" src="src/pages/registration.ts"></script>
</body>

</html>
